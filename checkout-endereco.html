<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Endereço de Entrega</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <section class="screen screen--checkout" aria-label="Dados de Entrega">

            <header class="home-header">
                <button class="icon-button" aria-label="Menu Principal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                
                <div class="home-header__brand-group">
                    <a href="home.html" class="home-brand" style="text-decoration: none; color: inherit; cursor: pointer;">Pichau</a>
                </div>
                
                <a href="carrinho.html" class="cart-button-highlight" aria-label="Carrinho de Compras">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-count">(5)</span>
                </a>
            </header>

            <div class="header__copy" aria-label="Container">
                <h1>Dados de Envio</h1>
            </div>

            <form class="checkout-form">
                
                <div class="form-container card-surface">
                    <h2 class="form-container__title">Endereço de Entrega</h2>
                    
                    <div class="form-group">
                        <label for="cep" class="form-label">CEP</label>
                        <div class="cep-field-group">
                            <input type="text" id="cep" class="form-input" placeholder="00000-000" required>
                            <button type="button" class="cep-search-button">Buscar</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="logradouro" class="form-label">Endereço / Logradouro</label>
                        <input type="text" id="logradouro" class="form-input" placeholder="Av. Paulista, Rua das Flores..." required>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="numero" class="form-label">Número</label>
                            <input type="text" id="numero" class="form-input" placeholder="123" required>
                        </div>
                        <div class="form-group flex-1">
                            <label for="complemento" class="form-label">Complemento</label>
                            <input type="text" id="complemento" class="form-input" placeholder="Apto, Bloco, Casa...">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="bairro" class="form-label">Bairro</label>
                        <input type="text" id="bairro" class="form-input" placeholder="Centro" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-2">
                            <label for="cidade" class="form-label">Cidade</label>
                            <input type="text" id="cidade" class="form-input" placeholder="São Paulo" required>
                        </div>
                        <div class="form-group flex-1">
                            <label for="uf" class="form-label">UF</label>
                            <input type="text" id="uf" class="form-input" placeholder="SP" maxlength="2" required>
                        </div>
                    </div>
                </div>

                <a href="checkout-pagamento.html" class="checkout-button form-submit-button" style="text-decoration: none; display: flex;">
                    <span>Ir para o Pagamento</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="checkout-icon">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </a>
            </form>

            <nav class="bottom-nav" aria-label="Navegação Principal">
                <a href="home.html" class="bottom-nav__item" aria-label="Ir para Início">
                    <img src="figma-assets/nav-home.svg" alt="Início" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Home</span>
                </a>
                
                <a href="#" class="bottom-nav__item" aria-label="Ir para Catálogo">
                    <img src="figma-assets/nav-catalog.svg" alt="Catálogo" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Catálogo</span>
                </a>
                
                <a href="builds.html" class="bottom-nav__item" aria-label="Ir para Builds">
                    <img src="figma-assets/nav-builds.svg" alt="Builds" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Builds</span>
                </a>
                
                <a href="preco.html" class="bottom-nav__item" aria-label="Ir para Ofertas">
                    <img src="figma-assets/nav-offers.svg" alt="Ofertas" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Ofertas</span>
                </a>
                
                <a href="#" class="bottom-nav__item" aria-label="Ir para Perfil">
                    <img src="figma-assets/nav-profile.svg" alt="Perfil" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Perfil</span>
                </a>
            </nav>

        </section>
    </main>
</body>
</html>
