<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado - Pichau</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="offcanvas-backdrop" aria-hidden="true"></div>
    <aside class="offcanvas-menu" aria-hidden="true">
        <div class="offcanvas-menu__header">
            <strong>Menu</strong>
            <button class="offcanvas-close" aria-label="Fechar menu">×</button>
        </div>
        <nav class="offcanvas-nav">
            <a href="home.html">Home</a>
            <a href="builds.html">Builds</a>
            <a href="carrinho.html">Carrinho</a>
            <a href="preco.html">Ofertas</a>
            <a href="#">Perfil</a>
        </nav>
    </aside>
    <main class="page">
        <section class="screen screen--success" aria-label="Confirmação de Compra">
            
            <header class="home-header">
                <button class="icon-button" aria-label="Menu Principal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                
                <div class="home-header__brand-group">
                    <a href="home.html" class="home-brand" style="text-decoration: none; color: inherit; cursor: pointer;">Pichau</a>
                </div>
                <div class="header-links">
                    <a href="home.html">Home</a>
                    <a href="builds.html">Builds</a>
                    <a href="preco.html">Ofertas</a>
                    <a href="carrinho.html">Carrinho</a>
                </div>
                
                <a href="carrinho.html" class="cart-button-highlight" aria-label="Carrinho de Compras">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-count">(0)</span>
                </a>
            </header>

            <section class="success-hero">
                <div class="success-hero__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <h1 class="success-hero__title">Tudo Certo!</h1>
                <p class="success-hero__message">Seu pedido foi realizado com sucesso.</p>
            </section>

            <section class="order-details card-surface">
                <h2 class="order-details__title">Detalhes do Pedido</h2>
                
                <div class="detail-row">
                    <span class="detail-label">Número do pedido</span>
                    <strong class="detail-value">4920194832</strong>
                </div>
                
                <div class="detail-row">
                    <span class="detail-label">Pagamento</span>
                    <strong class="detail-value">Pix</strong>
                </div>
                
                <div class="detail-row">
                    <span class="detail-label">Total</span>
                    <strong class="detail-value detail-value--highlight">R$ 14.228,83</strong>
                </div>
            </section>

            <section class="success-actions">
                <button type="button" class="checkout-button form-submit-button">
                    <span>Acompanhar Pedido</span>
                </button>
                
                <a href="home.html" class="button-ghost">
                    Voltar para o Início
                </a>
            </section>

            <nav class="bottom-nav" aria-label="Navegação Principal">
                <a href="home.html" class="bottom-nav__item" aria-label="Ir para Início">
                    <img src="figma-assets/nav-home.svg" alt="Início" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Home</span>
                </a>
                
                <a href="#" class="bottom-nav__item" aria-label="Ir para Catálogo">
                    <img src="figma-assets/nav-catalog.svg" alt="Catálogo" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Catálogo</span>
                </a>
                
                <a href="builds.html" class="bottom-nav__item" aria-label="Ir para Builds">
                    <img src="figma-assets/nav-builds.svg" alt="Builds" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Builds</span>
                </a>
                
                <a href="preco.html" class="bottom-nav__item" aria-label="Ir para Ofertas">
                    <img src="figma-assets/nav-offers.svg" alt="Ofertas" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Ofertas</span>
                </a>
                
                <a href="#" class="bottom-nav__item" aria-label="Ir para Perfil">
                    <img src="figma-assets/nav-profile.svg" alt="Perfil" class="bottom-nav__icon">
                    <span class="bottom-nav__label">Perfil</span>
                </a>
            </nav>

        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
